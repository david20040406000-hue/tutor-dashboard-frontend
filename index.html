<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 會考複習</title>
  <style>
    /* 🌟 核心防護 */
    html { background-color: #fff3f3; overscroll-behavior-y: none; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; padding: 20px 20px 40px 20px;
      min-height: 100vh; color: #334155; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none;
    }

    /* 絕不穿透的底層漸層布幕 */
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #fff3f3 0%, #f7f3ff 50%, #ffffff 100%); z-index: -10;
    }
    
    /* 容器只負責整體位移，不負責耗效能的 gap 動畫 */
    .dashboard-container { 
      position: relative; width: 100%; max-width: 500px; display: flex; flex-direction: column; 
      gap: 24px; /* 固定間距，不參與動畫 */
      transform: translateY(var(--container-y, 0px)); 
      transition: transform 0.6s cubic-bezier(0.25, 1.2, 0.5, 1);
      will-change: transform;
    }
    /* 拖拉時關閉延遲，達到 0 秒跟手 */
    .dashboard-container.dragging { transition: transform 0.05s linear !important; }
    
    /* ─── 🎬 開機加載動畫 ─── */
    .ios-clock-header {
      display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; user-select: none; text-align: center;
      position: relative; z-index: 20; opacity: 1; transform: translateY(0); margin-top: 36px; margin-bottom: 12px;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
    }
    .ios-clock-time { display: flex; align-items: center; justify-content: center; width: 100%; font-size: 60px; font-weight: 700; color: #1e293b; line-height: 1; letter-spacing: 0px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.01)); }
    .time-part { flex: 1; } .time-hour { text-align: right; } .time-min { text-align: left; } .time-colon { margin: 0 4px; position: relative; top: -3px; }
    .ios-clock-date { font-size: 14px; font-weight: 600; color: #64748b; letter-spacing: 1px; margin-top: 8px; }

    body.loading .ios-clock-header { transform: translateY(25vh); margin-top: 0; margin-bottom: 0; animation: clockFloatIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes clockFloatIn { from { opacity: 0; transform: translateY(30vh) scale(0.94); } to { opacity: 1; transform: translateY(25vh) scale(1); } }

    /* 進度條 */
    .loading-bar-wrapper {
      width: 220px; height: 4px; background: rgba(226, 232, 240, 0.6); border-radius: 10px; overflow: hidden; margin-left: auto !important; margin-right: auto !important; display: block;
      position: absolute; z-index: 15; top: 0; left: 50%; transform: translate(-50%, 75vh); opacity: 1; transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .loading-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff4b72, #a259ff, #0072ff); transition: width 0.1s linear; }
    body.active .loading-bar-wrapper { opacity: 0; transform: translate(-50%, 70vh) scale(0.8); pointer-events: none; }

    /* 🌟 重構：模塊的 GPU 幾何與按壓引擎 */
    .apple-module {
      position: relative; z-index: 5;
      background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 28px; padding: 30px;
      box-shadow: 0 10px 30px rgba(162, 89, 255, 0.05), 0 1px 3px rgba(0,0,0,0.02); 
      cursor: pointer; opacity: 0; 
      
      /* 🌟 終極 120fps 組合技：將「微縮」與「拉扯縫隙」全部交給 GPU 處理！ */
      transform: 
        translateY(calc(var(--pull-top, 0px) * var(--i-top, 0))) 
        translateY(calc(var(--pull-bot, 0px) * var(--i-bot, 0))) 
        scale(var(--press-scale, 1));
        
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
      will-change: transform; /* 強制啟動硬體加速 */
    }
    
    /* 拖曳時解除回彈延遲，讓縫隙瞬間拉開 */
    .dragging .apple-module { transition: transform 0.05s linear !important; }
    
    /* 開機浮現動畫 */
    body.active .apple-module { animation: moduleSlideUp 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    body.active .apple-module:nth-child(3) { animation-delay: 0.1s; }
    body.active .apple-module:nth-child(4) { animation-delay: 0.25s; }
    body.active .apple-module:nth-child(5) { animation-delay: 0.4s; }
    @keyframes moduleSlideUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }

    /* 內部排版與文字 */
    .module-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; pointer-events: none; }
    .module-header { font-size: 13px; font-weight: 700; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
    .task-badge { font-size: 11px; padding: 4px 10px; font-weight: 700; border-radius: 9999px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); transition: all 0.3s ease; pointer-events: auto; }
    .badge-remain { background: #ffe4e6; color: #f43f5e; } .badge-done { background: #d1fae5; color: #065f46; }
    .rainbow-text { background: linear-gradient(135deg, #ff4b72 0%, #a259ff 50%, #4b91ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 4px rgba(162, 89, 255, 0.2)); }
    
    .task-list { display: flex; flex-direction: column; gap: 12px; }
    .task-item { background: rgba(255, 255, 255, 0.8); border: 1px solid #f1f5f9; border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; transition: opacity 0.35s ease, background 0.35s ease, box-shadow 0.15s ease; }
    .task-info { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; color: #475569; pointer-events: none; }
    .task-item.overdue { background: rgba(254, 230, 230, 0.85); border: 1px solid rgba(254, 205, 205, 0.6); }
    .tag-gradient { color: white; padding: 5px 10px; border-radius: 9px; font-size: 12px; font-weight: 800; box-shadow: 0 3px 8px rgba(0, 0, 0, 0.04); text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .tag-國文 { background: linear-gradient(135deg, #ff4b72, #ff758c); } .tag-英文 { background: linear-gradient(135deg, #0072ff, #00c6ff); } .tag-數學 { background: linear-gradient(135deg, #a259ff, #6366f1); } .tag-自然 { background: linear-gradient(135deg, #059669, #34d399); } .tag-社會 { background: linear-gradient(135deg, #eab308, #ff7e5f); }
    .check-circle { width: 22px; height: 22px; border-radius: 8px; border: 2px solid #e2e8f0; display: flex; justify-content: center; align-items: center; transition: all 0.3s; font-size: 12px; font-weight: bold; color: #cbd5e1; pointer-events: none; }
    .task-item.checked { opacity: 0.35; filter: grayscale(60%); background: rgba(248, 250, 252, 0.5) !important; border: 1px solid #f1f5f9 !important; }
    .task-item.checked .check-circle { background: #64748b; border: none; color: white; }
    
    .subject-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 20px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
    .subject-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
    .subject-header:active { background: rgba(248, 250, 252, 0.8); }
    .subject-title { font-weight: 800; font-size: 16px; color: #334155; white-space: nowrap; min-width: 40px; pointer-events: none; }
    .header-bar-container { flex-grow: 1; margin: 0 16px; height: 6px; background: rgba(226, 232, 240, 0.5); border-radius: 10px; overflow: hidden; pointer-events: none; }
    .header-bar-fill { height: 100%; border-radius: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .subject-right { display: flex; align-items: center; gap: 12px; white-space: nowrap; pointer-events: none; }
    .subject-progress { font-weight: 800; font-size: 16px; display: inline-block; }
    .arrow-icon { width: 10px; height: 10px; border-right: 2px solid #cbd5e1; border-bottom: 2px solid #cbd5e1; transform: rotate(45deg); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s; }
    .subject-card.open .arrow-icon { transform: rotate(-135deg); }
    
    .subject-details-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.2s cubic-bezier(0.4, 0, 0.2, 1); will-change: grid-template-rows; }
    .subject-card.open .subject-details-wrapper { grid-template-rows: 1fr; }
    .subject-details-inner { overflow: hidden; background: rgba(248, 250, 252, 0.5); cursor: default; }
    .volume-item { padding: 12px 20px; border-top: 1px solid rgba(226, 232, 240, 0.6); display: flex; justify-content: space-between; align-items: center; }
    .volume-name { font-size: 14px; font-weight: 600; color: #64748b; }
    .volume-bar-container { display: flex; align-items: center; gap: 10px; width: 60%; }
    .volume-track { flex-grow: 1; height: 8px; background: rgba(226, 232, 240, 0.8); border-radius: 10px; overflow: hidden; }
    .volume-fill { height: 100%; border-radius: 10px; }
    .volume-pct { font-size: 12px; font-weight: 700; min-width: 36px; text-align: right; display: inline-block; }
    .countdown-text { font-size: 28px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 900; pointer-events: none; }

    /* 🌟 v1.00 Spotlight 版本氣泡 */
    .version-pill {
      margin: 8px auto 20px auto; padding: 10px 24px; border-radius: 50px;
      background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.9);
      font-size: 13px; font-weight: 800; letter-spacing: 0.5px; text-align: center;
      opacity: 0; transform: translateY(20px);
      
      /* GPU 加速連動張力引擎 */
      will-change: transform;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* 確保拉扯時也有物理連動 */
    .dashboard-container .version-pill {
      transform: translateY(calc(var(--pull-top, 0px) * var(--i-top, 0))) translateY(calc(var(--pull-bot, 0px) * var(--i-bot, 0))) scale(1);
    }
    body.active .version-pill { animation: versionPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: 0.6s; }
    @keyframes versionPop { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="loading" ontouchstart="">

  <div class="dashboard-container" id="dashboard">
    <div class="ios-clock-header">
      <div id="ios-time" class="ios-clock-time"><div id="ios-hr" class="time-part time-hour">00</div><div class="time-colon">:</div><div id="ios-min" class="time-part time-min">00</div></div>
      <div id="ios-date" class="ios-clock-date">1月1日 星期一</div>
    </div>

    <div class="loading-bar-wrapper"><div id="loading-fill" class="loading-bar-fill"></div></div>

    <div class="apple-module interactable" style="--i-top: 0; --i-bot: 3;">
      <div class="module-top-row"><div class="module-header">⚡ 今日任務</div><span id="task-badge" class="task-badge badge-remain">讀取中...</span></div>
      <div id="task-container" class="task-list"></div>
    </div>

    <div class="apple-module interactable" style="--i-top: 1; --i-bot: 2;">
      <div class="module-top-row" style="justify-content: center;"><div class="module-header">📊 複習進度</div></div>
      <div id="accordion-container"></div>
    </div>

    <div class="apple-module interactable countdown-wrapper" style="--i-top: 2; --i-bot: 1;" onclick="triggerCountdownVibrate()">
      <div class="module-top-row" style="justify-content: center;"><div class="module-header">⏰ 會考倒數計時</div></div>
      <div id="countdown" class="rainbow-text countdown-text">00天 00時 00分 00秒</div>
    </div>
    
    <div class="version-pill" style="--i-top: 3; --i-bot: 0;">
      <span class="rainbow-text">✨ v1.00 會考複習控制台</span>
    </div>
  </div>

  <script>
    // 1. 時鐘
    function updateIosClock() {
      const now = new Date();
      const hr = String(now.getHours()).padStart(2, '0'); const min = String(now.getMinutes()).padStart(2, '0');
      const month = now.getMonth() + 1; const date = now.getDate();
      const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
      document.getElementById('ios-hr').innerText = hr; document.getElementById('ios-min').innerText = min;
      document.getElementById('ios-date').innerText = `${month}月${date}日 ${dayNames[now.getDay()]}`;
    }
    setInterval(updateIosClock, 1000); updateIosClock();

    // 2. 倒數計時
    const targetDate = new Date("May 15, 2027 08:00:00").getTime();
    setInterval(() => {
      const distance = targetDate - new Date().getTime();
      const d = Math.floor(distance / (1000 * 60 * 60 * 24));
      const h = String(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
      const m = String(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
      const s = String(Math.floor((distance % (1000 * 60)) / 1000)).padStart(2, '0');
      document.getElementById("countdown").innerHTML = `${d}天 ${h}時 ${m}分 ${s}秒`;
    }, 1000);
    
    function triggerCountdownVibrate() { if (navigator.vibrate) navigator.vibrate(40); }

    // 3. 任務渲染
    function renderLiveTasks(tasks) {
      const container = document.getElementById('task-container'); container.innerHTML = '';
      if (tasks.length === 0) {
        container.innerHTML = `<div class="volume-item" style="justify-content: center; border:0;"><span style="color:#94a3b8; font-size:14px; font-weight:600;">📅 今日無排定挑戰，好好休息！</span></div>`;
        updateBadgeUI(0, 0); return;
      }
      tasks.sort((a, b) => { if (a.overdue && !b.overdue) return -1; if (!a.overdue && b.overdue) return 1; return 0; });
      updateBadgeUI(tasks.filter(t => !t.done).length, tasks.length);
      tasks.forEach(task => {
        const item = document.createElement('div');
        item.className = `task-item ${task.overdue ? 'overdue' : ''} ${task.done ? 'checked' : ''}`;
        item.setAttribute('data-id', task.id); 
        item.onclick = function(e) { e.stopPropagation(); toggleTask(this); };
        const displayLabel = task.overdue ? `⚠️ ${task.name}` : task.name;
        item.innerHTML = `<div class="task-info"><span class="tag-gradient tag-${task.subject}">${task.subject}</span><span>${displayLabel}</span></div><div class="check-circle">${task.done ? '✓' : ''}</div>`;
        container.appendChild(item);
      });
    }

    function updateBadgeUI(remaining, total) {
      const badge = document.getElementById('task-badge');
      if (total === 0 || remaining === 0) { badge.innerText = "全數通關 ✨"; badge.className = "task-badge badge-done"; }
      else { badge.innerText = `${remaining} 剩餘`; badge.className = "task-badge badge-remain"; }
    }

    // 4. 打勾逆向同步
    async function toggleTask(card) {
      if (navigator.vibrate) navigator.vibrate(40);
      const taskId = card.getAttribute('data-id');
      const newDoneState = !card.classList.contains('checked');
      card.classList.toggle('checked'); card.querySelector('.check-circle').innerHTML = newDoneState ? "✓" : "";
      updateBadgeUI(document.querySelectorAll('.task-item').length - document.querySelectorAll('.task-item.checked').length, document.querySelectorAll('.task-item').length);
      try {
        const response = await fetch(`https://tutor-dashboard-backend-9tc6.onrender.com/api/tasks/${taskId}/toggle`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ done: newDoneState }) });
        const result = await response.json();
        if (result.status === "success") {
          setTimeout(async () => {
            const progressRes = await fetch('https://tutor-dashboard-backend-9tc6.onrender.com/api/progress');
            const progressJson = await progressRes.json();
            if (progressJson.status === "success") renderAccordion(progressJson.data);
          }, 1500);
        } else { alert("同步失敗: " + result.message); }
      } catch (error) { console.error("後端連線失敗", error); }
    }

    // 5. 大盤手風琴
    const subjectThemes = {
      "國文": { gradient: "linear-gradient(90deg, #ff4b72, #ff758c)", textStyle: "background: linear-gradient(135deg, #ff4b72, #ff758c); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" },
      "英文": { gradient: "linear-gradient(90deg, #0072ff, #00c6ff)", textStyle: "background: linear-gradient(135deg, #0072ff, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" },
      "數學": { gradient: "linear-gradient(90deg, #a259ff, #6366f1)", textStyle: "background: linear-gradient(135deg, #a259ff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" },
      "自然": { gradient: "linear-gradient(90deg, #059669, #34d399)", textStyle: "background: linear-gradient(135deg, #059669, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" },
      "社會": { gradient: "linear-gradient(90deg, #eab308, #ff7e5f)", textStyle: "background: linear-gradient(135deg, #eab308, #ff7e5f); -webkit-background-clip: text; -webkit-text-fill-color: transparent;" }
    };

    const forcedOrder = ["國文", "英文", "數學", "自然", "社會"];
    const volumeOrder = ["第一冊", "第二冊", "第三冊", "第四冊", "第五冊", "第六冊"];

    function renderAccordion(data) {
      const container = document.getElementById('accordion-container'); container.innerHTML = ''; 
      forcedOrder.forEach(subject => {
        if (!data[subject]) return; 
        const info = data[subject]; const theme = subjectThemes[subject];
        const card = document.createElement('div'); card.className = 'subject-card';
        const sortedVolumes = Object.entries(info.volumes).sort((a, b) => {
          let idxA = volumeOrder.indexOf(a[0]); let idxB = volumeOrder.indexOf(b[0]);
          if (idxA === -1) idxA = 999; if (idxB === -1) idxB = 999; return idxA - idxB;
        });

        let volumesHtml = '';
        for (const [volName, volPct] of sortedVolumes) {
          volumesHtml += `<div class="volume-item"><span class="volume-name">${volName}</span><div class="volume-bar-container"><div class="volume-track"><div class="volume-fill" style="width: ${volPct}%; background: ${theme.gradient};"></div></div><span class="volume-pct" style="${theme.textStyle}">${volPct.toFixed(1)}%</span></div></div>`;
        }
        if (volumesHtml === '') volumesHtml = `<div class="volume-item"><span class="volume-name" style="color:#cbd5e1;">尚未建立子項目進度</span></div>`;

        card.innerHTML = `
          <div class="subject-header" onclick="toggleCard(this, '${subject}', event)">
            <span class="subject-title">${subject}</span>
            <div class="header-bar-container"><div class="header-bar-fill" style="width: 0%; background: ${theme.gradient};" data-target-width="${info.totalProgress}"></div></div>
            <div class="subject-right"><span class="subject-progress" style="${theme.textStyle}">${info.totalProgress.toFixed(1)}%</span><div class="arrow-icon"></div></div>
          </div>
          <div class="subject-details-wrapper"><div class="subject-details-inner">${volumesHtml}</div></div>`;
        container.appendChild(card);
      });
      setTimeout(() => { document.querySelectorAll('.header-bar-fill').forEach(bar => { bar.style.width = bar.getAttribute('data-target-width') + '%'; }); }, 100);
    }

    function toggleCard(headerElement, subject, event) {
      event.stopPropagation();
      if (navigator.vibrate) navigator.vibrate(30);
      const card = headerElement.parentElement; const arrow = headerElement.querySelector('.arrow-icon'); const isOpening = !card.classList.contains('open');
      document.querySelectorAll('.subject-card').forEach(c => { c.classList.remove('open'); c.querySelector('.arrow-icon').style.borderColor = "#cbd5e1"; });
      if (isOpening) { card.classList.add('open'); const themeColorMap = {"國文":"#ff4b72", "英文":"#0072ff", "數學":"#a259ff", "自然":"#059669", "社會":"#eab308"}; arrow.style.borderColor = themeColorMap[subject]; }
    }

    // 6. 遠端連線
    async function updateDashboardData() {
      try {
        const progressRes = await fetch('https://tutor-dashboard-backend-9tc6.onrender.com/api/progress');
        const progressJson = await progressRes.json();
        if (progressJson.status === "success") renderAccordion(progressJson.data);
        
        const tasksRes = await fetch('https://tutor-dashboard-backend-9tc6.onrender.com/api/tasks');
        const tasksJson = await tasksRes.json();
        if (tasksJson.status === "success") renderLiveTasks(tasksJson.data);
      } catch (error) { console.error("Notion 數據請求失敗", error); }
    }

    async function launchDashboardSequence() {
      const minAnimationWindow = new Promise(resolve => setTimeout(resolve, 1500));
      let simulatedProgress = 0;
      const loadingFill = document.getElementById('loading-fill');
      const progressTracker = setInterval(() => {
        if (simulatedProgress < 95) {
          simulatedProgress += (100 - simulatedProgress) * 0.04;
          if (loadingFill) loadingFill.style.width = simulatedProgress + '%';
        }
      }, 35);

      const dataQuery = updateDashboardData();
      await Promise.all([minAnimationWindow, dataQuery]);
      clearInterval(progressTracker);
      if (loadingFill) loadingFill.style.width = '100%';
      setTimeout(() => { document.body.classList.remove('loading'); document.body.classList.add('active'); }, 250);
    }
    launchDashboardSequence();

    // 🌟 7. 硬體級神經重構：獨立下沉感 + 120fps 張力拉扯
    let startY = 0, pullDirection = 0, isPulling = false;
    const dashboard = document.getElementById('dashboard');

    // ✅ JS 獨立綁定：保證每點必沉！縮放比例 0.95 絕對有感！
    document.querySelectorAll('.interactable').forEach(mod => {
      const pressDown = () => mod.style.setProperty('--press-scale', '0.95');
      const pressUp = () => mod.style.setProperty('--press-scale', '1');
      mod.addEventListener('touchstart', pressDown, { passive: true });
      mod.addEventListener('touchend', pressUp);
      mod.addEventListener('touchcancel', pressUp);
      mod.addEventListener('touchmove', pressUp, { passive: true }); // 一滑動就解除下沉
    });

    window.addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY; pullDirection = 0; isPulling = false;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (!e.touches || e.touches.length === 0) return;
      const currentY = e.touches[0].clientY;
      let deltaY = currentY - startY;

      // 防止手風琴誤觸發抖動 (死區)
      if (Math.abs(deltaY) < 4 && pullDirection === 0) return;

      if (pullDirection === 0) {
        if (window.scrollY <= 0 && deltaY > 0) { pullDirection = 1; startY = currentY; dashboard.classList.add('dragging'); } 
        else if (Math.ceil(window.innerHeight + window.scrollY) >= document.body.offsetHeight - 2 && deltaY < 0) { pullDirection = -1; startY = currentY; dashboard.classList.add('dragging'); }
      }

      if (pullDirection !== 0) {
        isPulling = true;
        if (e.cancelable) e.preventDefault(); 
        const absPull = Math.abs(currentY - startY);
        const maxStretch = window.innerHeight * 0.6; 
        const stretch = (absPull * maxStretch) / (absPull + maxStretch); 
        
        // 🚀 呼叫 GPU：直接寫入 CSS 變數，由 transform 渲染！
        requestAnimationFrame(() => {
          dashboard.style.setProperty('--container-y', `${pullDirection * stretch * 0.6}px`);
          if (pullDirection === 1) { // 往下拉
            document.body.style.setProperty('--pull-top', `${stretch * 0.12}px`);
            document.body.style.setProperty('--pull-bot', `0px`);
          } else { // 往上拉
            document.body.style.setProperty('--pull-top', `0px`);
            document.body.style.setProperty('--pull-bot', `${-stretch * 0.12}px`);
          }
        });
      }
    }, { passive: false });

    window.addEventListener('touchend', () => {
      if (isPulling) {
        isPulling = false; pullDirection = 0; dashboard.classList.remove('dragging');
        requestAnimationFrame(() => {
          dashboard.style.setProperty('--container-y', '0px');
          document.body.style.setProperty('--pull-top', '0px');
          document.body.style.setProperty('--pull-bot', '0px');
        });
      }
    });
  </script>
</body>
